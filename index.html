<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SPM — Sheraton Keystone Package Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F4F6;
    --surface:#FFFFFF;
    --border:#E1E4E9;
    --ink:#16202B;
    --ink-soft:#5B6573;
    --navy:#16202B;
    --navy-soft:#E7EAEE;
    --gold:#A9842E;
    --gold-dark:#8A6A22;
    --gold-soft:#F4ECD8;
    --green:#2C7A57;
    --green-soft:#E3F1EA;
    --red:#B1432F;
    --red-soft:#F6E7E2;
    --radius:12px;
    --shadow:0 2px 10px rgba(22,32,43,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;
    min-height:100vh;
  }
  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;font-weight:600;margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  a{color:var(--gold-dark);}

  /* Top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:14px 18px;background:var(--navy);border-bottom:1px solid var(--navy);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:8px;}
  .swatch{width:9px;height:9px;background:var(--gold);border-radius:2px;display:inline-block;flex-shrink:0;}
  .wordmark{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.04em;color:#fff;}
  .topbar nav{display:flex;gap:6px;align-items:center;}
  .topbar .staffchip{
    font-size:0.78rem;background:var(--gold-soft);
    padding:5px 10px;border-radius:999px;font-weight:600;color:var(--gold-dark);
    white-space:nowrap;
  }
  .iconbtn{
    background:none;border:1px solid rgba(255,255,255,0.22);border-radius:9px;
    padding:7px 11px;font-size:0.8rem;color:rgba(255,255,255,0.85);font-weight:600;
  }
  .iconbtn:hover{background:rgba(255,255,255,0.08);}

  .view{padding:18px;flex:1;}
  .view-narrow{max-width:420px;margin:0 auto;width:100%;}

  /* Generic cards / surfaces */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .pad{padding:18px;}

  /* Login */
  .login-wrap{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 20px;gap:22px;background:var(--navy);
  }
  .lockup{text-align:center;}
  .lockup .brandline{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
  .lockup .swatch{width:13px;height:13px;}
  .lockup .markline{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:2.3rem;letter-spacing:0.05em;color:#fff;}
  .lockup .rule{width:46px;height:2px;background:var(--gold);margin:0 auto 14px;}
  .lockup .tagline{font-family:'IBM Plex Sans',sans-serif;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin:0;}
  .greeting{color:#fff;font-size:1.5rem;text-align:center;margin-top:4px;}
  .subtext-light{color:rgba(255,255,255,0.6);text-align:center;font-size:0.88rem;margin-top:2px;}
  .hint-light{color:rgba(255,255,255,0.5);font-size:0.8rem;text-align:center;margin-top:6px;}
  .stafflist{display:flex;flex-direction:column;gap:8px;width:100%;max-width:380px;}
  .staffrow{
    display:flex;align-items:center;gap:12px;background:var(--surface);
    border:1px solid var(--border);border-radius:12px;padding:13px 16px;
    font-weight:600;font-size:1rem;text-align:left;width:100%;
  }
  .staffrow:hover{border-color:var(--gold);}
  .avatar{
    width:34px;height:34px;border-radius:50%;background:var(--gold-soft);color:var(--gold-dark);
    display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;
  }
  .typetag{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.78rem;flex-shrink:0;
  }
  .typetag.guest{background:var(--gold-soft);color:var(--gold-dark);}
  .typetag.employee{background:var(--navy-soft);color:var(--navy);}
  .ghostbtn{
    background:none;border:1px dashed var(--border);color:var(--ink-soft);border-radius:12px;
    padding:12px;font-weight:600;font-size:0.92rem;width:100%;max-width:380px;
  }
  .ghostbtn:hover{border-color:var(--gold);color:var(--gold-dark);}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:0.82rem;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;
    font-size:0.98rem;background:var(--surface);color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .pinrow{display:flex;gap:8px;}
  .pinrow input{letter-spacing:4px;font-size:1.2rem;text-align:center;}

  .btn{
    border:none;border-radius:10px;padding:12px 18px;font-weight:700;font-size:0.95rem;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-primary{background:var(--gold);color:#fff;}
  .btn-primary:hover{background:var(--gold-dark);}
  .btn-block{width:100%;}
  .btn-secondary{background:var(--bg);color:var(--ink);border:1px solid var(--border);}
  .btn-secondary:hover{background:#F0ECE3;}
  .btn-danger{background:var(--red-soft);color:var(--red);}
  .btn-danger:hover{background:#f0d9d3;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{background:#356a4c;}
  .btn-sm{padding:8px 12px;font-size:0.82rem;}
  .err{color:var(--red);font-size:0.85rem;margin-top:6px;font-weight:600;}
  .formrow{display:flex;gap:10px;}
  .formrow .field{flex:1;}

  /* Segmented control */
  .segmented{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .segmented button{
    flex:1;padding:10px;background:var(--surface);border:none;font-weight:600;font-size:0.9rem;color:var(--ink-soft);
    border-right:1px solid var(--border);
  }
  .segmented button:last-child{border-right:none;}
  .segmented button.active{background:var(--gold);color:#fff;}

  /* Dashboard */
  .statrow{display:flex;gap:10px;margin-bottom:16px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:600;line-height:1;}
  .stat .lbl{font-size:0.74rem;color:var(--ink-soft);font-weight:600;margin-top:2px;}
  .stat.amber .num{color:var(--gold-dark);}
  .stat.green .num{color:var(--green);}

  .toolbar{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .filterrow{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{
    border:1px solid var(--border);background:var(--surface);border-radius:999px;
    padding:6px 12px;font-size:0.8rem;font-weight:600;color:var(--ink-soft);
  }
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .pkglist{display:flex;flex-direction:column;gap:10px;}
  .pkgcard{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left;width:100%;position:relative;
  }
  .pkgcard:hover{border-color:var(--gold);}
  .pkgcard .info{flex:1;min-width:0;}
  .pkgcard .name{font-weight:700;font-size:0.98rem;}
  .pkgcard .sub{font-size:0.8rem;color:var(--ink-soft);margin-top:2px;}
  .pill{
    font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0;
  }
  .pill.awaiting{background:var(--gold-soft);color:var(--gold-dark);}
  .pill.picked{background:var(--green-soft);color:var(--green);}

  .fab{
    position:fixed;bottom:22px;right:50%;transform:translateX(310px);
    background:var(--gold);color:#fff;border:none;border-radius:999px;
    padding:14px 20px;font-weight:700;box-shadow:0 4px 14px rgba(140,95,44,0.35);
    display:flex;align-items:center;gap:6px;z-index:30;
  }
  @media (max-width:640px){
    .fab{right:18px;transform:none;}
  }
  .empty{text-align:center;color:var(--ink-soft);padding:50px 20px;font-size:0.92rem;}

  /* Detail */
  .detailhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .detail-menu-wrap,.topbar-menu-wrap{position:relative;display:inline-block;}
  .menubtn{
    background:none;border:1px solid var(--border);border-radius:8px;width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;color:var(--ink-soft);
    font-size:1.05rem;line-height:1;letter-spacing:1px;
  }
  .menubtn:hover{background:var(--bg);}
  .menubtn-light{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.85);}
  .menubtn-light:hover{background:rgba(255,255,255,0.08);}
  .menu-dropdown{
    position:absolute;right:0;top:36px;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;box-shadow:var(--shadow);min-width:150px;z-index:10;overflow:hidden;
  }
  .menu-dropdown button{
    display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;
    font-size:0.85rem;font-weight:600;color:var(--ink);
  }
  .menu-dropdown button:hover{background:var(--bg);}
  .detailrow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.92rem;}
  .detailrow:last-child{border-bottom:none;}
  .detailrow .k{color:var(--ink-soft);font-weight:600;}
  .detailrow .v{font-weight:600;text-align:right;}

  .sigbox{margin-top:16px;}
  canvas#sigCanvasDetail{
    width:100%;height:170px;border:1.5px dashed var(--border);border-radius:10px;background:#fff;
    touch-action:none;
  }
  .sigactions{display:flex;gap:10px;margin-top:10px;}
  .sigimg{max-width:220px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-top:6px;}

  /* Scanner modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,16,12,0.78);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:18px;
  }
  .modal-card{
    background:var(--surface);border-radius:16px;max-width:420px;width:100%;
    padding:18px;max-height:88vh;overflow:auto;
  }
  #scanner-reader{width:100%;border-radius:10px;overflow:hidden;background:#111;min-height:220px;}
  .scanstatus{font-size:0.85rem;color:var(--ink-soft);margin-top:10px;min-height:20px;}

  .toast{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 18px;border-radius:999px;font-size:0.86rem;font-weight:600;z-index:200;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .banner{
    background:var(--gold-soft);color:var(--gold-dark);border-radius:10px;padding:10px 14px;
    font-size:0.82rem;font-weight:600;margin-bottom:14px;
  }
  .hint{font-size:0.78rem;color:var(--ink-soft);margin-top:5px;}
  .staffmgmt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
  .staffmgmt-row:last-child{border-bottom:none;}
  .backlink{display:inline-block;margin-bottom:14px;color:var(--ink-soft);font-weight:600;font-size:0.85rem;text-decoration:none;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============== Storage helpers ==============
   Backed by a Netlify Function (netlify/functions/data.js) which reads/writes
   Netlify Blobs. No accounts of any kind are required to use this app —
   the storage endpoint is just part of this site. */
const DATA_ENDPOINT = '/.netlify/functions/data';
let backendReachable = true;
let lastBackendError = '';

async function storageGetJSON(key, fallback){
  try{
    const res = await fetch(DATA_ENDPOINT + '?key=' + encodeURIComponent(key));
    if (!res.ok){
      backendReachable = false;
      lastBackendError = 'GET ' + key + ' failed: HTTP ' + res.status;
      console.error(lastBackendError);
      return fallback;
    }
    backendReachable = true;
    const data = await res.json();
    if (data.value === undefined || data.value === null) return fallback;
    return JSON.parse(data.value);
  }catch(e){ backendReachable = false; lastBackendError = 'GET ' + key + ' failed: ' + e; return fallback; }
}
async function storageSetJSON(key, value){
  try{
    const res = await fetch(DATA_ENDPOINT + '?key=' + encodeURIComponent(key), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: JSON.stringify(value) })
    });
    if (!res.ok){
      backendReachable = false;
      lastBackendError = 'SET ' + key + ' failed: HTTP ' + res.status;
      console.error(lastBackendError);
      return false;
    }
    backendReachable = true;
    return true;
  }catch(e){ backendReachable = false; lastBackendError = 'SET ' + key + ' failed: ' + e; console.error(lastBackendError); return false; }
}

/* ============== State ============== */
const state = {
  view: 'login',
  loading: true,
  storageAvailable: true,
  currentStaff: null,
  staff: [],
  packages: [],
  departments: [],
  locations: [],
  filterStatus: 'all',
  filterType: 'all',
  search: '',
  detailId: null,
  editId: null,
  detailMenuOpen: false,
  topbarMenuOpen: false,
  signing: false,
  toast: null,
  loginSelectedId: null,
  loginError: '',
  addError: '',
  staffAddError: '',
  deptAddError: '',
  locationAddError: '',
  pinChangeError: '',
  staffPinResetId: null,
  staffPinResetError: '',
  reportPeriodType: 'month',
  reportYear: new Date().getFullYear(),
  reportMonth: new Date().getMonth() + 1,
  reportQuarter: Math.floor(new Date().getMonth() / 3) + 1,
  reportHalf: new Date().getMonth() < 6 ? 1 : 2
};

let signatureHasStrokes = false;
let scannerInstance = null;
let audioCtx = null;
let torchOn = false;

/* ============== Utilities ============== */
function escapeHtml(str){
  return String(str === undefined || str === null ? '' : str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function initials(name){
  return (name||'').trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase() || '?';
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const time = d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  if (sameDay) return 'Today, ' + time;
  return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ', ' + time;
}
function guessCarrier(codeRaw){
  const code = (codeRaw||'').trim().toUpperCase();
  if (!code) return '';
  if (/^1Z[0-9A-Z]{16}$/.test(code)) return 'UPS';
  if (/^TBA/.test(code)) return 'Amazon';
  if (/^(94|93|92|82|420)\d{16,26}$/.test(code) || /^[A-Z]{2}\d{9}US$/.test(code)) return 'USPS';
  if (/^\d{12}$/.test(code) || /^\d{15}$/.test(code) || /^\d{20}$/.test(code)) return 'FedEx';
  if (/^JD\d{16,18}$/.test(code) || /^\d{10,11}$/.test(code)) return 'DHL';
  return '';
}
function showToast(msg){
  state.toast = msg;
  render();
  setTimeout(()=>{ state.toast = null; render(); }, 2200);
}

/* ============== Init ============== */
async function init(){
  state.staff = await storageGetJSON('staff-roster', []);
  state.packages = await storageGetJSON('package-index', []);
  state.departments = await storageGetJSON('department-list', []);

  const storedLocations = await storageGetJSON('location-list', null);
  if (storedLocations === null){
    state.locations = ['Receiving Area', 'Back Dock', 'Bell Closet', 'Front Desk'];
    await storageSetJSON('location-list', state.locations);
  } else {
    state.locations = storedLocations;
  }

  state.storageAvailable = backendReachable;
  state.loading = false;
  render();
}

/* ============== Render ============== */
const root = document.getElementById('app');

function render(){
  let html = '';
  if (state.toast) html += `<div class="toast">${escapeHtml(state.toast)}</div>`;

  if (state.loading){
    html += `<div class="view"><p style="text-align:center;color:var(--ink-soft);padding:60px 0;">Loading…</p></div>`;
    root.innerHTML = html;
    return;
  }

  if (state.view !== 'login') html += renderTopBar();

  if (state.view === 'login') html += renderLogin();
  else if (state.view === 'dashboard') html += renderDashboard();
  else if (state.view === 'add') html += renderAddForm();
  else if (state.view === 'detail') html += renderDetail();
  else if (state.view === 'admin') html += renderAdmin();
  else if (state.view === 'reports') html += renderReports();
  else if (state.view === 'change-pin') html += renderChangePin();

  root.innerHTML = html;
  attachSignaturePadIfNeeded();
}

function renderTopBar(){
  const s = state.currentStaff;
  const menuItems = [];
  if (s && s.isAdmin) menuItems.push(`<button data-action="goto-admin">Admin</button>`);
  if (s && s.isAdmin) menuItems.push(`<button data-action="goto-reports">Reports</button>`);
  menuItems.push(`<button data-action="goto-change-pin">Change PIN</button>`);
  menuItems.push(`<button data-action="logout">Log out</button>`);

  return `
  <div class="topbar">
    <div class="brand"><span class="swatch"></span><span class="wordmark">SPM</span></div>
    <nav>
      ${s ? `<span class="staffchip">${escapeHtml(s.name)}</span>` : ''}
      <button class="iconbtn" data-action="goto-dashboard">Packages</button>
      <div class="topbar-menu-wrap">
        <button class="menubtn menubtn-light" data-action="toggle-topbar-menu" aria-label="More options">⋮</button>
        ${state.topbarMenuOpen ? `<div class="menu-dropdown">${menuItems.join('')}</div>` : ''}
      </div>
    </nav>
  </div>`;
}

function renderLogin(){
  if (!state.storageAvailable){
    var bannerHtml = `<div class="banner">Heads up: this app can't reach its storage right now${lastBackendError ? ' (' + escapeHtml(lastBackendError) + ')' : ''}. Check that the Netlify Function deployed correctly, or your connection, then reload.</div>`;
  } else { var bannerHtml = ''; }

  const lockup = `
    <div class="lockup">
      <div class="brandline"><span class="swatch"></span><span class="markline">SPM</span></div>
      <div class="rule"></div>
      <p class="tagline">Sheraton Keystone &middot; Package Management</p>
    </div>`;

  if (state.staff.length === 0){
    return `
    <div class="login-wrap">
      ${lockup}
      <div class="card pad" style="width:100%;max-width:380px;">
        ${bannerHtml}
        <h3 style="margin-bottom:12px;font-size:1.05rem;">Set up the first admin</h3>
        <form data-form="add-staff-login">
          <div class="field"><label>Your name</label><input name="name" required autocomplete="off"></div>
          <div class="field"><label>Choose a 4–6 digit PIN</label><input name="pin" inputmode="numeric" pattern="[0-9]{4,6}" required placeholder="••••"></div>
          ${state.staffAddError ? `<div class="err">${escapeHtml(state.staffAddError)}</div>` : ''}
          <button class="btn btn-primary btn-block" type="submit" style="margin-top:6px;">Save and continue</button>
        </form>
        <p class="hint">This first person becomes the admin and can add other staff and departments from the Admin tab afterward.</p>
      </div>
    </div>`;
  }

  if (state.loginSelectedId){
    const staffMember = state.staff.find(x=>x.id===state.loginSelectedId);
    return `
    <div class="login-wrap">
      ${lockup}
      <h1 class="greeting">Hi, ${escapeHtml(staffMember ? staffMember.name : '')}</h1>
      <p class="subtext-light">Enter your PIN</p>
      <div class="card pad" style="width:100%;max-width:380px;">
        <form data-form="pin-confirm">
          <div class="field"><input name="pin" class="pinrow" inputmode="numeric" pattern="[0-9]{4,6}" autofocus placeholder="••••" style="text-align:center;letter-spacing:6px;font-size:1.3rem;"></div>
          ${state.loginError ? `<div class="err">${escapeHtml(state.loginError)}</div>` : ''}
          <button class="btn btn-primary btn-block" type="submit">Continue</button>
          <button class="btn btn-secondary btn-block" type="button" data-action="cancel-select-staff" style="margin-top:8px;">Back</button>
        </form>
      </div>
    </div>`;
  }

  return `
  <div class="login-wrap">
    ${lockup}
    <p class="subtext-light">Who's logging in?</p>
    ${bannerHtml}
    <div class="stafflist">
      ${state.staff.map(s => `
        <button class="staffrow" data-action="select-staff" data-id="${s.id}">
          <span class="avatar">${initials(s.name)}</span>
          <span>${escapeHtml(s.name)}</span>
        </button>`).join('')}
    </div>
    <p class="hint-light">Don't see your name? Ask your admin to add you from the Admin tab.</p>
  </div>`;

function filteredPackages(){
  let list = state.packages.filter(p => !p.deleted);
  if (state.filterStatus !== 'all') list = list.filter(p => p.status === state.filterStatus);
  if (state.filterType !== 'all') list = list.filter(p => p.recipientType === state.filterType);
  if (state.search.trim()){
    const q = state.search.trim().toLowerCase();
    list = list.filter(p =>
      (p.recipientName||'').toLowerCase().includes(q) ||
      (p.roomOrDept||'').toLowerCase().includes(q) ||
      (p.trackingNumber||'').toLowerCase().includes(q) ||
      (p.carrier||'').toLowerCase().includes(q) ||
      (p.senderName||'').toLowerCase().includes(q) ||
      (p.storageLocation||'').toLowerCase().includes(q)
    );
  }
  list.sort((a,b)=> new Date(b.receivedAt) - new Date(a.receivedAt));
  return list;
}

/* ============== Reports ============== */
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getReportRange(){
  const y = state.reportYear;
  let startMonth, monthSpan, label;
  if (state.reportPeriodType === 'month'){
    startMonth = state.reportMonth - 1;
    monthSpan = 1;
    label = MONTH_NAMES[startMonth] + ' ' + y;
  } else if (state.reportPeriodType === 'quarter'){
    startMonth = (state.reportQuarter - 1) * 3;
    monthSpan = 3;
    label = 'Q' + state.reportQuarter + ' ' + y;
  } else if (state.reportPeriodType === 'half'){
    startMonth = (state.reportHalf - 1) * 6;
    monthSpan = 6;
    label = 'H' + state.reportHalf + ' ' + y;
  } else {
    startMonth = 0;
    monthSpan = 12;
    label = String(y);
  }
  const start = new Date(y, startMonth, 1);
  const end = new Date(y, startMonth + monthSpan, 1);
  return { start, end, label };
}

function getReportPackages(){
  const { start, end } = getReportRange();
  return state.packages.filter(p => {
    if (p.deleted) return false;
    const d = new Date(p.receivedAt);
    return d >= start && d < end;
  });
}

function groupCount(list, keyFn){
  const counts = {};
  list.forEach(item => {
    const k = keyFn(item) || 'Unspecified';
    counts[k] = (counts[k] || 0) + 1;
  });
  return Object.entries(counts).sort((a,b) => b[1] - a[1]);
}

function computeReportStats(packages){
  const total = packages.length;
  const guestCount = packages.filter(p => p.recipientType === 'guest').length;
  const employeeCount = total - guestCount;
  const pickedUp = packages.filter(p => p.status === 'picked_up');
  const awaitingCount = total - pickedUp.length;

  let avgHours = null;
  if (pickedUp.length > 0){
    const totalHours = pickedUp.reduce((sum, p) => {
      const hrs = (new Date(p.pickedUpAt) - new Date(p.receivedAt)) / 3600000;
      return sum + Math.max(hrs, 0);
    }, 0);
    avgHours = totalHours / pickedUp.length;
  }

  const byCarrier = groupCount(packages, p => p.carrier);
  const byLocation = groupCount(packages, p => p.storageLocation);
  const byDepartment = groupCount(packages.filter(p => p.recipientType === 'employee'), p => p.roomOrDept);

  return { total, guestCount, employeeCount, pickedUpCount: pickedUp.length, awaitingCount, avgHours, byCarrier, byLocation, byDepartment };
}

function renderBreakdownList(pairs, emptyText){
  if (pairs.length === 0) return `<p class="hint">${emptyText}</p>`;
  return pairs.map(([k, count]) => `

  `).join('');
}

  return `

          <button type="button" class="${state.reportPeriodType==='month'?'active':''}" data-action="set-report-type" data-value="month">Month</button>

    <button class="btn btn-secondary btn-block" data-action="download-report-csv" style="margin-top:16px;">Download CSV for this period</button>
  </div>`;
}

function csvEscape(value){
  const s = String(value === undefined || value === null ? '' : value);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function downloadReportCSV(){
  const range = getReportRange();
  const packages = getReportPackages().slice().sort((a,b) => new Date(a.receivedAt) - new Date(b.receivedAt));
  const headers = ['Recipient Name','Type','Room/Department','Carrier','Storage Location','Sender','Tracking Number','Received At','Received By','Status','Picked Up At','Picked Up By','Notes'];
  const rows = [headers.join(',')];
  packages.forEach(p => {
    rows.push([
      csvEscape(p.recipientName),
      csvEscape(p.recipientType),
      csvEscape(p.roomOrDept),
      csvEscape(p.carrier),
      csvEscape(p.storageLocation),
      csvEscape(p.senderName),
      csvEscape(p.trackingNumber),
      csvEscape(p.receivedAt),
      csvEscape(p.receivedBy),
      csvEscape(p.status),
      csvEscape(p.pickedUpAt),
      csvEscape(p.pickedUpBy),
      csvEscape(p.notes)
    ].join(','));
  });
  const csvText = rows.join('\n');
  const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'spm-packages-' + range.label.replace(/\s+/g, '-') + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============== Signature pad ============== */
function attachSignaturePadIfNeeded(){
  const canvas = document.getElementById('sigCanvasDetail');
  if (canvas && !canvas.dataset.bound){
    setupSignaturePad(canvas);
    canvas.dataset.bound = 'true';
  }
  const sigSlot = document.getElementById('sigViewSlot');
  if (sigSlot && !sigSlot.dataset.loaded){
    sigSlot.dataset.loaded = 'true';
    const id = sigSlot.getAttribute('data-sig-id');
    storageGetJSON('package-sig:' + id, null).then(sig => {
      if (sig && sig.dataUrl){
        sigSlot.innerHTML = `<p class="hint" style="margin-top:10px;">Signature on file</p><img class="sigimg" src="${sig.dataUrl}">`;
      } else {
        sigSlot.innerHTML = `<p class="hint">Signature not found.</p>`;
      }
    });
  }
}

function setupSignaturePad(canvas){
  const ctx = canvas.getContext('2d');
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx.scale(ratio, ratio);
  ctx.strokeStyle = '#2B2622';
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  signatureHasStrokes = false;
  let drawing = false, lastX = 0, lastY = 0;

  function pos(e){
    const r = canvas.getBoundingClientRect();
    return [e.clientX - r.left, e.clientY - r.top];
  }
  canvas.addEventListener('pointerdown', e => {
    drawing = true;
    [lastX, lastY] = pos(e);
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
  });
  canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    const [x, y] = pos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    [lastX, lastY] = [x, y];
    signatureHasStrokes = true;
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev => {
    canvas.addEventListener(ev, () => { drawing = false; });
  });
}

function clearSignaturePad(){
  const canvas = document.getElementById('sigCanvasDetail');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const ratio = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / ratio, canvas.height / ratio);
  signatureHasStrokes = false;
}

/* ============== Scanner ============== */
function loadScript(src){
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[data-loaded="' + src + '"]')) return resolve();
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => { s.dataset.loaded = src; resolve(); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function openScanner(){
  try{
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }catch(e){ audioCtx = null; }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'scannerOverlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <h3 style="margin-bottom:10px;">Scan barcode</h3>
      <div id="scanner-reader"></div>
      <div class="scanstatus" id="scannerStatus">Starting camera…</div>
      <button class="btn btn-secondary btn-block" id="scannerTorchBtn" style="display:none;margin-top:10px;">Turn on flashlight</button>
      <button class="btn btn-secondary btn-block" id="scannerCancelBtn" style="margin-top:10px;">Cancel</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('scannerCancelBtn').addEventListener('click', closeScannerModal);

  loadScript('https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js')
    .then(startScanning)
    .catch(() => setScannerStatus('Could not load the scanner. Check your connection, then close this and type the number in manually.'));
}

function setScannerStatus(msg){
  const el = document.getElementById('scannerStatus');
  if (el) el.textContent = msg;
}

function startScanning(){
  try{
    const F = window.Html5QrcodeSupportedFormats;
    const formats = F ? [
      F.QR_CODE, F.CODE_128, F.CODE_39, F.CODE_93, F.EAN_13, F.EAN_8,
      F.UPC_A, F.UPC_E, F.ITF, F.CODABAR, F.RSS_14, F.RSS_EXPANDED
    ] : undefined;

    scannerInstance = new Html5Qrcode('scanner-reader', formats ? { formatsToSupport: formats, verbose: false } : undefined);
    scannerInstance.start(
      { facingMode: 'environment' },
      {
        fps: 12,
        qrbox: { width: 280, height: 130 },
        aspectRatio: 1.7777778,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true },
        videoConstraints: {
          facingMode: 'environment',
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      },
      onScanSuccess,
      () => {}
    ).then(() => {
      setScannerStatus('Center the barcode in the box, a few inches back, and hold steady.');
      setupTorchButton();
    }).catch(err => setScannerStatus('Camera unavailable (' + err + '). Close this and type the number in manually.'));
  }catch(e){
    setScannerStatus('Scanner failed to start. Close this and type the number in manually.');
  }
}

function setupTorchButton(){
  const torchBtn = document.getElementById('scannerTorchBtn');
  if (!torchBtn || !scannerInstance) return;
  try{
    const capabilities = scannerInstance.getRunningTrackCameraCapabilities();
    const torch = capabilities && capabilities.torchFeature ? capabilities.torchFeature() : null;
    if (torch && torch.isSupported()){
      torchOn = false;
      torchBtn.style.display = 'block';
      torchBtn.textContent = 'Turn on flashlight';
      torchBtn.onclick = () => {
        torchOn = !torchOn;
        torch.apply(torchOn)
          .then(() => { torchBtn.textContent = torchOn ? 'Turn off flashlight' : 'Turn on flashlight'; })
          .catch(() => {});
      };
    }
  }catch(e){ /* capability check not supported on this device/browser, leave button hidden */ }
}

function onScanSuccess(decodedText){
  setScannerStatus('Got it: ' + decodedText);
  playBeep();
  if (navigator.vibrate) navigator.vibrate(200);
  const trackingInput = document.getElementById('trackingInput');
  if (trackingInput) trackingInput.value = decodedText;
  const carrierSelect = document.getElementById('carrierSelect');
  if (carrierSelect && !carrierSelect.value){
    const guess = guessCarrier(decodedText);
    if (guess) carrierSelect.value = guess;
  }
  closeScannerModal();
}

function playBeep(){
  try{
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.value = 0.18;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
  }catch(e){ /* audio not available, no big deal */ }
}

function closeScannerModal(){
  const overlay = document.getElementById('scannerOverlay');
  if (scannerInstance){
    scannerInstance.stop().then(() => scannerInstance.clear()).catch(() => {});
    scannerInstance = null;
  }
  torchOn = false;
  if (overlay) overlay.remove();
}

/* ============== Actions ============== */
async function handleAction(action, target){
  const id = target.getAttribute('data-id');
  const value = target.getAttribute('data-value');

  if (action !== 'toggle-detail-menu') state.detailMenuOpen = false;
  if (action !== 'toggle-topbar-menu') state.topbarMenuOpen = false;

  if (action === 'select-staff'){ state.loginSelectedId = id; state.loginError=''; render(); }
  else if (action === 'cancel-select-staff'){ state.loginSelectedId = null; state.loginError=''; render(); }
  else if (action === 'logout'){ state.currentStaff = null; state.view = 'login'; state.loginSelectedId=null; render(); }
  else if (action === 'goto-dashboard'){ state.view = 'dashboard'; state.detailId=null; state.signing=false; render(); }
  else if (action === 'goto-admin'){
    if (!state.currentStaff || !state.currentStaff.isAdmin){ showToast('Admin access only'); return; }
    state.view = 'admin'; state.staffAddError=''; state.deptAddError=''; state.locationAddError=''; state.staffPinResetId=null; state.staffPinResetError=''; render();
  }
  else if (action === 'goto-change-pin'){ state.view = 'change-pin'; state.pinChangeError=''; render(); }
  else if (action === 'goto-reports'){
    if (!state.currentStaff || !state.currentStaff.isAdmin){ showToast('Admin access only'); return; }
    state.view = 'reports'; render();
  }
  else if (action === 'set-report-type'){ state.reportPeriodType = value; render(); }
  else if (action === 'download-report-csv'){ downloadReportCSV(); }
  else if (action === 'start-pin-reset'){ state.staffPinResetId = id; state.staffPinResetError=''; render(); }
  else if (action === 'cancel-pin-reset'){ state.staffPinResetId = null; state.staffPinResetError=''; render(); }
  else if (action === 'goto-add'){ state.view = 'add'; state._addType='guest'; state._addDraft={}; state.addError=''; state.editId=null; render(); }
  else if (action === 'set-add-type'){
    const form = document.querySelector('form[data-form="add-package"]');
    if (form){
      state._addDraft = {
        recipientName: form.recipientName.value,
        roomOrDept: form.roomOrDept.value,
        carrier: form.carrier.value,
        storageLocation: form.storageLocation.value,
        senderName: form.senderName.value,
        trackingNumber: form.trackingNumber.value,
        notes: form.notes.value
      };
    }
    state._addType = value;
    render();
  }
  else if (action === 'set-status'){ state.filterStatus = value; render(); }
  else if (action === 'set-type'){ state.filterType = value; render(); }
  else if (action === 'refresh'){
    state.packages = await storageGetJSON('package-index', []);
    showToast('Refreshed');
  }
  else if (action === 'open-detail'){ state.detailId = id; state.view = 'detail'; state.signing=false; state.editId=null; state.detailMenuOpen=false; render(); }
  else if (action === 'toggle-detail-menu'){ state.detailMenuOpen = !state.detailMenuOpen; render(); }
  else if (action === 'toggle-topbar-menu'){ state.topbarMenuOpen = !state.topbarMenuOpen; render(); }
  else if (action === 'edit-package'){
    state.detailMenuOpen = false;
    const pkg = state.packages.find(p => p.id === id);
    if (!pkg) return;
    if (!canEditPackage(pkg)){ showToast('Only the staff member who logged this, or an admin, can edit it'); return; }
    state.editId = id;
    state._addType = pkg.recipientType;
    state._addDraft = {
      recipientName: pkg.recipientName,
      roomOrDept: pkg.roomOrDept,
      carrier: pkg.carrier,
      storageLocation: pkg.storageLocation,
      senderName: pkg.senderName,
      trackingNumber: pkg.trackingNumber,
      notes: pkg.notes
    };
    state.addError = '';
    state.view = 'add';
    render();
  }
  else if (action === 'open-scanner'){ openScanner(); }
  else if (action === 'start-pickup-guest'){ state.signing = true; render(); }
  else if (action === 'clear-signature'){ clearSignaturePad(); }
  else if (action === 'confirm-pickup-guest'){ await confirmPickupGuest(id); }
  else if (action === 'confirm-pickup-employee'){ await confirmPickupEmployee(id); }
  else if (action === 'delete-staff'){ await deleteStaff(id); }
  else if (action === 'delete-department'){ await deleteDepartment(id); }
  else if (action === 'delete-location'){ await deleteLocation(id); }
  else if (action === 'delete-package'){ await deletePackage(id); }
  else if (action === 'restore-package'){ await restorePackage(id); }
}

async function confirmPickupGuest(id){
  if (!signatureHasStrokes){
    alert('Please have the guest sign before confirming pickup.');
    return;
  }
  const canvas = document.getElementById('sigCanvasDetail');
  const dataUrl = canvas.toDataURL('image/png');
  const sigOk = await storageSetJSON('package-sig:' + id, { dataUrl });
  const pkg = state.packages.find(p => p.id === id);
  pkg.status = 'picked_up';
  pkg.pickedUpAt = new Date().toISOString();
  pkg.pickedUpBy = state.currentStaff.name;
  pkg.signed = true;
  const ok = await storageSetJSON('package-index', state.packages);
  state.signing = false;
  state.view = 'detail';
  if (ok && sigOk) showToast('Pickup confirmed');
  else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  render();
}

async function confirmPickupEmployee(id){
  const pkg = state.packages.find(p => p.id === id);
  pkg.status = 'picked_up';
  pkg.pickedUpAt = new Date().toISOString();
  pkg.pickedUpBy = state.currentStaff.name;
  pkg.signed = false;
  const ok = await storageSetJSON('package-index', state.packages);
  if (ok) showToast('Pickup confirmed');
  else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  render();
}

async function deleteStaff(id){
  const target = state.staff.find(s => s.id === id);
  if (target && target.isAdmin){ showToast("Can't remove the admin account"); return; }
  if (!confirm('Remove this staff member from the login list?')) return;
  state.staff = state.staff.filter(s => s.id !== id);
  const ok = await storageSetJSON('staff-roster', state.staff);
  if (!ok) showToast('Failed to sync — check connection (' + lastBackendError + ')');
  render();
}

async function deleteDepartment(name){
  if (!confirm('Remove this department?')) return;
  state.departments = state.departments.filter(d => d !== name);
  const ok = await storageSetJSON('department-list', state.departments);
  if (!ok) showToast('Failed to sync — check connection (' + lastBackendError + ')');
  render();
}

async function deleteLocation(name){
  if (!confirm('Remove this location?')) return;
  state.locations = state.locations.filter(l => l !== name);
  const ok = await storageSetJSON('location-list', state.locations);
  if (!ok) showToast('Failed to sync — check connection (' + lastBackendError + ')');
  render();
}

async function deletePackage(id){
  const pkg = state.packages.find(p => p.id === id);
  if (!pkg) return;
  if (!canEditPackage(pkg)){ showToast('Only the staff member who logged this, or an admin, can remove it'); return; }
  if (!confirm('Remove this package from the list? An admin will still be able to see it was removed and restore it if needed.')) return;
  pkg.deleted = true;
  pkg.deletedBy = state.currentStaff.name;
  pkg.deletedAt = new Date().toISOString();
  const ok = await storageSetJSON('package-index', state.packages);
  state.view = 'dashboard';
  state.detailId = null;
  state.editId = null;
  render();
  if (ok) showToast('Package removed');
  else showToast('Removed on this device, but failed to sync — check connection (' + lastBackendError + ')');
}

async function restorePackage(id){
  if (!state.currentStaff || !state.currentStaff.isAdmin){ showToast('Admin access only'); return; }
  const pkg = state.packages.find(p => p.id === id);
  if (!pkg) return;
  if (!confirm('Restore this package back to the active list?')) return;
  pkg.deleted = false;
  pkg.deletedBy = null;
  pkg.deletedAt = null;
  const ok = await storageSetJSON('package-index', state.packages);
  render();
  if (ok) showToast('Package restored');
  else showToast('Restored on this device, but failed to sync — check connection (' + lastBackendError + ')');
}

/* ============== Form submissions ============== */
async function handleSubmit(formName, form){
  if (formName === 'add-staff-login'){
    const name = form.name.value.trim();
    const pin = form.pin.value.trim();
    if (!name || !/^[0-9]{4,6}$/.test(pin)){ state.staffAddError = 'Enter a name and a 4–6 digit PIN.'; render(); return; }
    const isFirst = state.staff.length === 0;
    const newStaff = { id: uid(), name, pin, isAdmin: isFirst };
    state.staff.push(newStaff);
    const ok = await storageSetJSON('staff-roster', state.staff);
    state.currentStaff = newStaff;
    state.staffAddError = '';
    state.view = 'dashboard';
    render();
    if (!ok) showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  }
  else if (formName === 'pin-confirm'){
    const pin = form.pin.value.trim();
    const staffMember = state.staff.find(s => s.id === state.loginSelectedId);
    if (staffMember && staffMember.pin === pin){
      state.currentStaff = staffMember;
      state.loginSelectedId = null;
      state.loginError = '';
      state.view = 'dashboard';
      render();
    } else {
      state.loginError = 'Incorrect PIN. Try again.';
      render();
    }
  }
  else if (formName === 'add-staff-mgmt'){
    const name = form.name.value.trim();
    const pin = form.pin.value.trim();
    if (!name || !/^[0-9]{4,6}$/.test(pin)){ state.staffAddError = 'Enter a name and a 4–6 digit PIN.'; render(); return; }
    state.staff.push({ id: uid(), name, pin, isAdmin: false });
    const ok = await storageSetJSON('staff-roster', state.staff);
    state.staffAddError = '';
    render();
    if (ok) showToast('Staff member added');
    else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  }
  else if (formName === 'add-department'){
    const deptName = form.deptName.value.trim();
    if (!deptName){ state.deptAddError = 'Enter a department name.'; render(); return; }
    if (state.departments.some(d => d.toLowerCase() === deptName.toLowerCase())){
      state.deptAddError = 'That department already exists.'; render(); return;
    }
    state.departments.push(deptName);
    const ok = await storageSetJSON('department-list', state.departments);
    state.deptAddError = '';
    render();
    if (ok) showToast('Department added');
    else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  }
  else if (formName === 'add-location'){
    const locationName = form.locationName.value.trim();
    if (!locationName){ state.locationAddError = 'Enter a location name.'; render(); return; }
    if (state.locations.some(l => l.toLowerCase() === locationName.toLowerCase())){
      state.locationAddError = 'That location already exists.'; render(); return;
    }
    state.locations.push(locationName);
    const ok = await storageSetJSON('location-list', state.locations);
    state.locationAddError = '';
    render();
    if (ok) showToast('Location added');
    else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  }
  else if (formName === 'change-pin'){
    const currentPin = form.currentPin.value.trim();
    const newPin = form.newPin.value.trim();
    const confirmPin = form.confirmPin.value.trim();
    if (state.currentStaff.pin !== currentPin){ state.pinChangeError = 'Current PIN is incorrect.'; render(); return; }
    if (!/^[0-9]{4,6}$/.test(newPin)){ state.pinChangeError = 'New PIN must be 4–6 digits.'; render(); return; }
    if (newPin !== confirmPin){ state.pinChangeError = 'New PIN and confirmation do not match.'; render(); return; }
    state.currentStaff.pin = newPin;
    const ok = await storageSetJSON('staff-roster', state.staff);
    state.pinChangeError = '';
    state.view = 'dashboard';
    render();
    if (ok) showToast('PIN updated');
    else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  }
  else if (formName === 'reset-pin'){
    if (!state.currentStaff || !state.currentStaff.isAdmin) return;
    const staffId = form.getAttribute('data-id');
    const target = state.staff.find(s => s.id === staffId);
    if (!target){ state.staffPinResetId = null; render(); return; }
    const newPin = form.newPin.value.trim();
    const confirmPin = form.confirmPin.value.trim();
    if (!/^[0-9]{4,6}$/.test(newPin)){ state.staffPinResetError = 'PIN must be 4–6 digits.'; render(); return; }
    if (newPin !== confirmPin){ state.staffPinResetError = 'PINs do not match.'; render(); return; }
    target.pin = newPin;
    const ok = await storageSetJSON('staff-roster', state.staff);
    state.staffPinResetId = null;
    state.staffPinResetError = '';
    render();
    if (ok) showToast('PIN updated for ' + target.name);
    else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  }
  else if (formName === 'add-package'){
    const fd = new FormData(form);
    const recipientName = (fd.get('recipientName')||'').trim();
    const roomOrDept = (fd.get('roomOrDept')||'').trim();
    if (!recipientName || !roomOrDept){
      state.addError = 'Please fill in the name and room/department.';
      render();
      return;
    }

    if (state.editId){
      const pkg = state.packages.find(p => p.id === state.editId);
      if (!pkg){ state.addError = 'Package not found.'; render(); return; }
      if (!canEditPackage(pkg)){ showToast('Only the staff member who logged this, or an admin, can edit it'); state.view='dashboard'; render(); return; }
      pkg.recipientType = state._addType || pkg.recipientType;
      pkg.recipientName = recipientName;
      pkg.roomOrDept = roomOrDept;
      pkg.carrier = fd.get('carrier') || '';
      pkg.storageLocation = (fd.get('storageLocation')||'').trim();
      pkg.senderName = (fd.get('senderName')||'').trim();
      pkg.trackingNumber = (fd.get('trackingNumber')||'').trim();
      pkg.notes = (fd.get('notes')||'').trim();
      pkg.lastEditedBy = state.currentStaff.name;
      pkg.lastEditedAt = new Date().toISOString();
      const ok = await storageSetJSON('package-index', state.packages);
      state.addError = '';
      state.detailId = pkg.id;
      state.view = 'detail';
      state.editId = null;
      render();
      if (ok) showToast('Package updated');
      else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
      return;
    }

    const pkg = {
      id: uid(),
      recipientType: state._addType || 'guest',
      recipientName,
      roomOrDept,
      carrier: fd.get('carrier') || '',
      storageLocation: (fd.get('storageLocation')||'').trim(),
      senderName: (fd.get('senderName')||'').trim(),
      trackingNumber: (fd.get('trackingNumber')||'').trim(),
      notes: (fd.get('notes')||'').trim(),
      receivedAt: new Date().toISOString(),
      receivedBy: state.currentStaff.name,
      receivedById: state.currentStaff.id,
      status: 'awaiting',
      pickedUpAt: null,
      pickedUpBy: null,
      signed: false,
      deleted: false
    };
    state.packages.push(pkg);
    const ok = await storageSetJSON('package-index', state.packages);
    state.addError = '';
    state.view = 'dashboard';
    render();
    if (ok) showToast('Package logged for ' + recipientName);
    else showToast('Saved on this device, but failed to sync — check connection (' + lastBackendError + ')');
  }
}

/* ============== Event delegation ============== */
root.addEventListener('click', e => {
  if (state.detailMenuOpen && !e.target.closest('.detail-menu-wrap')){
    state.detailMenuOpen = false;
    render();
  }
  if (state.topbarMenuOpen && !e.target.closest('.topbar-menu-wrap')){
    state.topbarMenuOpen = false;
    render();
  }
  const el = e.target.closest('[data-action]');
  if (el) handleAction(el.getAttribute('data-action'), el);
});
root.addEventListener('submit', e => {
  const form = e.target.closest('form[data-form]');
  if (form){
    e.preventDefault();
    handleSubmit(form.getAttribute('data-form'), form);
  }
});
root.addEventListener('input', e => {
  if (e.target.id === 'searchInput'){
    state.search = e.target.value;
    renderListOnly();
  }
});
root.addEventListener('change', e => {
  if (e.target.id === 'reportYearSelect'){ state.reportYear = parseInt(e.target.value, 10); render(); }
  else if (e.target.id === 'reportMonthSelect'){ state.reportMonth = parseInt(e.target.value, 10); render(); }
  else if (e.target.id === 'reportQuarterSelect'){ state.reportQuarter = parseInt(e.target.value, 10); render(); }
  else if (e.target.id === 'reportHalfSelect'){ state.reportHalf = parseInt(e.target.value, 10); render(); }
});

/* Re-render just the package list area on search, to avoid losing input focus */
function renderListOnly(){
  // Re-render the whole dashboard but restore focus + cursor on the search box.
  const active = document.activeElement;
  const selStart = active && active.id === 'searchInput' ? active.selectionStart : null;
  render();
  const newInput = document.getElementById('searchInput');
  if (newInput && selStart !== null){
    newInput.focus();
    newInput.setSelectionRange(selStart, selStart);
  }
}

/* Auto-refresh shared data periodically while on the dashboard, skipping if the user is typing.
   Set to 45s (not faster) to stay well within Netlify's free-tier function call budget even
   if several devices sit on the dashboard all day — tap "Refresh" any time for an instant sync. */
setInterval(async () => {
  if (state.view !== 'dashboard') return;
  if (document.activeElement && document.activeElement.id === 'searchInput') return;
  state.packages = await storageGetJSON('package-index', state.packages);
  render();
}, 45000);

init();
</script>
